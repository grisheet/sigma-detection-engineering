title: Mimikatz Command Line Patterns
id: 2e9b7c34-1a6d-4f80-9b52-3c8a0d1e6f27
status: experimental
description: |
  Detects command-line artifacts strongly associated with Mimikatz and its ports
  (Invoke-Mimikatz, pypykatz, etc.). Matches on module::function syntax that is
  unique to the tool even when the binary is renamed.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/gentilkiwi/mimikatz
author: Nilesh Dhage
date: 2026-07-16
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.t1003.002
  - attack.t1003.004
  - attack.s0002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'sekurlsa::'
      - 'privilege::debug'
      - 'lsadump::'
      - 'logonpasswords'
      - 'kerberos::'
      - 'crypto::'
      - 'token::elevate'
      - 'wdigest'
      - 'DumpCreds'
      - 'Invoke-Mimikatz'
      - 'gentilkiwi'
  condition: selection
falsepositives:
  - Security tooling, detection tests and documentation that reference these strings.
level: critical
